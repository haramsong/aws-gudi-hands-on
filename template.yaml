AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: GitHub PR AI Review Bot (Serverless, Bedrock, Node22)

Parameters:
  GitHubWebhookSecret:
    Type: String
    NoEcho: true

  GitHubAppId:
    Type: String
    Description: GitHub App ID

  GitHubPrivateKey:
    Type: String
    NoEcho: true
    Description: GitHub App private key (.pem content)

  GitHubInstallationId:
    Type: String
    Description: GitHub App Installation ID

  BedrockModelId:
    Type: String
    Default: apac.amazon.nova-pro-v1:0
    Description: Bedrock model ID (cross-region inference profile)

  BedrockMaxTokens:
    Type: Number
    Default: 4096
    Description: Bedrock max output tokens

  SlackWebhookUrl:
    Type: String
    Default: ""
    Description: Slack Incoming Webhook URL (optional)

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]

Resources:
  # ---------------------------
  # SSM Parameter Store
  # ---------------------------
  GitHubPrivateKeyParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /pr-review-bot/github-private-key
      Type: String
      Value: !Ref GitHubPrivateKey

  # ---------------------------
  # Dispatcher Lambda
  # ---------------------------
  DispatcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pr-review-dispatcher
      CodeUri: dispatcher/
      Handler: index.handler
      Timeout: 10
      MemorySize: 256
      Environment:
        Variables:
          REVIEW_WORKER_NAME: !Ref WorkerFunction
          WEBHOOK_SECRET: !Ref GitHubWebhookSecret
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref WorkerFunction
      Events:
        Webhook:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: POST

  # ---------------------------
  # Review Worker Lambda
  # ---------------------------
  WorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: pr-review-worker
      CodeUri: worker/
      Handler: index.handler
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          GITHUB_APP_ID: !Ref GitHubAppId
          GITHUB_PRIVATE_KEY_PARAM: /pr-review-bot/github-private-key
          GITHUB_INSTALLATION_ID: !Ref GitHubInstallationId
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          BEDROCK_MAX_TOKENS: !Ref BedrockMaxTokens
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/pr-review-bot/github-private-key"

Outputs:
  WebhookUrl:
    Description: GitHub Webhook URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
